server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/flight_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
   redis:
    host: redis
    port: 6379
    
  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET}
  expiration: 60000000